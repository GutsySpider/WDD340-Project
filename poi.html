<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacation Easier | Interests</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/style_larger.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/main.js" type="module"></script>
    <script src="./js/poi.js?v=1.0.1" type="module"></script>

    <meta name="description" content="WDD 330 - Vacation Easier
                Michael Bowman
                Create a webpage that assist users plan activities to do with their parties.">
    <meta name="author" content="Michael Bowman">
    <link rel="icon" href="./public/images/favicon.ico">
</head>

<body>
    <header id="main-header"></header>

    <main>
        
        <section class="hero">
            <div class="hero-content">
                <div class="logo-circle"><img src="./public/images/distance.png" alt="distance logo" /></div>
                <h1>Adventure starts here!</h1>
            </div>
        </section>

        <section class="poi-search">
            <h2>Find Points of Interest</h2>

            <div class="search-bar">
                <input type="text" id="location-input" placeholder="Enter a city or location..." />
                <button id="search-btn">Search</button>
            </div>
            <div id="recent-searches" class="recent-searches"></div>

            <div id="poi-results"></div>
        </section>

        
        <div id="poi-container">
            <div id="poi-list"></div>
            <div id="map"></div>
        </div>

        
        <div id="poi-modal" class="modal">
            <div class="modal-content" id="poi-modal-content"></div>
        </div>

    </main>

    <footer id="main-footer"></footer>
</body>

</html>
